<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Quarterly Sales</title>
</head>
<body>
<style>body{font-family:Segoe UI,Arial,sans-serif;margin:24px;color:#0f172a}table{border-collapse:collapse;width:100%}caption{caption-side:top;text-align:left;font-weight:600;margin-bottom:8px;color:#334155}</style>
<h1>Quarterly Sales</h1>
<table class="report">
  <caption>Accounts (Q2 2026)</caption>
  <thead>
    <tr>
      <th style="border:1px solid #cbd5e1;padding:8px 12px;background-color:#1e293b;color:#ffffff;text-align:left;font-weight:bold" rowspan="2">Account</th>
      <th style="border:1px solid #cbd5e1;padding:8px 12px;background-color:#1e293b;color:#ffffff;text-align:left;font-weight:bold" rowspan="2">Region</th>
      <th style="border:1px solid #cbd5e1;padding:8px 12px;background-color:#1e293b;color:#ffffff;text-align:center;font-weight:bold" colspan="2">Financials</th>
      <th style="border:1px solid #cbd5e1;padding:8px 12px;background-color:#1e293b;color:#ffffff;text-align:left;font-weight:bold" rowspan="2">Note</th>
    </tr>
    <tr>
      <th style="border:1px solid #cbd5e1;padding:8px 12px;background-color:#334155;color:#ffffff;text-align:right;font-weight:bold">Amount</th>
      <th style="border:1px solid #cbd5e1;padding:8px 12px;background-color:#334155;color:#ffffff;text-align:right;font-weight:bold">Balance</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td style="border:1px solid #cbd5e1;padding:6px 12px"><a href="https://example.com/accounts/1">Acme Corp</a></td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px">North</td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px;text-align:right">$12,450.50</td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px;text-align:right">$3,200.00</td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px">Renewal pending</td>
    </tr>
    <tr>
      <td style="border:1px solid #cbd5e1;padding:6px 12px"><a href="https://example.com/accounts/2">Globex</a></td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px">-</td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px;text-align:right">$8,200.00</td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px;text-align:right;color:#dc2626">$-540.25</td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px">PAST DUE</td>
    </tr>
    <tr>
      <td style="border:1px solid #cbd5e1;padding:6px 12px"><a href="https://example.com/accounts/3">Initech</a></td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px">West</td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px;text-align:right">$15,999.99</td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px;text-align:right">$0.00</td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px">VIP</td>
    </tr>
  </tbody>
  <tfoot>
    <tr>
      <td style="border:1px solid #cbd5e1;padding:6px 12px;font-weight:bold" colspan="2">Total</td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px;text-align:right;font-weight:bold">$36,650.49</td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px;text-align:right;font-weight:bold">$2,659.75</td>
      <td style="border:1px solid #cbd5e1;padding:6px 12px;font-weight:bold"></td>
    </tr>
  </tfoot>
</table>
</body>
</html>
